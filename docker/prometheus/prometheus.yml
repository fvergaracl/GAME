# Prometheus configuration for the docker-compose observability stack
# (Sprint 11 follow-up). Loaded read-only into the prom/prometheus
# container at /etc/prometheus/prometheus.yml.
#
# Scrape interval is global (15s) -- the DSL alerts in
# docker/prometheus/rules/dsl-rules.yml use 5m / 10m windows so a 15s
# scrape gives the rate() at least 20 samples to work with.
#
# The api hostname is the docker-compose service name; resolved by the
# Docker embedded DNS on whichever network the prometheus service
# joined (backend / greencrowd / traefik-public).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: docker-compose

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: game-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: game
          component: api

  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"
