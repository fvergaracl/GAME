# Settings related with https://github.com/Greengage-project/interlink-project
version: "3.7"

services:
  api:
    container_name: "GAME_API_DEV"
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env.integrated
    environment:
      - ENV=dev
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=debug
    networks:
      - traefik-public
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - game-logs:/app/logs
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.GAME_API_DEV.rule=PathPrefix(`/gamengine`)
      - traefik.http.middlewares.strip-gamengine.stripprefix.prefixes=/gamengine
      - traefik.http.routers.GAME_API_DEV.middlewares=strip-gamengine
      - traefik.http.services.GAME_API_DEV.loadbalancer.server.port=8000
      
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"
  
  dashboard_game:
    container_name: "dashboard_game"
    build:
        context: ./dashboard
        dockerfile: Dockerfile
    volumes:
        - ./dashboard:/app 
        - /app/node_modules 
    environment:
        NODE_ENV: development
    depends_on:
        - api 
    labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.dashboard_game.rule=PathPrefix(`/gameDashboard`)
        - traefik.http.middlewares.strip-dashboard_game.stripprefix.prefixes=/gameDashboard
        - traefik.http.routers.dashboard_game.middlewares=strip-dashboard_game
        - traefik.http.services.dashboard_game.loadbalancer.server.port=3000
    networks:
        - traefik-public


    


  keycloakGame:
    container_name: "keycloakGame"
    image: keycloak/keycloak:25.0
    hostname: keycloak
    ports:
      - "8080:8080"
    env_file:
      - .env.integrated
    volumes:
      - keycloak-data:/opt/keycloak/data
    command: ["start-dev"]
    networks:
      - traefik-public

  healthcheck_service:
    build: ./healthcheck_service
    container_name: health_checker
    env_file:
      - .env.integrated
    environment:
      DB_HOST: "postgres"
      API_URL_KPI: "http://api:8000/api/v1/kpi"
    depends_on:
      - api
    networks:
      - traefik-public

  # Sprint 11 follow-up: Prometheus + Grafana on the same external
  # traefik-public network so prometheus can reach api:8000/metrics.
  # Direct port mappings (no traefik labels) for simplicity; if a
  # sub-path /prometheus or /grafana behind traefik is later needed,
  # add labels + GF_SERVER_ROOT_URL / --web.external-url accordingly.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: "GAME_PROMETHEUS"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - traefik-public
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: "GAME_GRAFANA"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - traefik-public
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  traefik-public:
    external: true

volumes:
  postgres-data:
  keycloak-data:
  game-logs:
  prometheus-data:
  grafana-data:
