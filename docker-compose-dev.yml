version: "3.7"

services:
  api:
    container_name: "GAME_API_DEV"
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=debug
    networks:
      - backend
    depends_on:
      - postgrespostgres
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - game-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  postgrespostgres:
    container_name: "postgrespostgres"
    image: postgres:16.0
    hostname: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      backend:
        aliases:
          - localhost
    volumes:
      - postgrespostgres-data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  keycloakgame:
    container_name: keycloakgame
    image: keycloak/keycloak:26.5
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/realm-template.json:/opt/keycloak/data/import/realm.json:ro
    command:
      - start-dev
      - --import-realm
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"


  dashboard_game:
    container_name: "dashboard_game"
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_GAME_API_URL: "http://localhost:8000/api/v1"
      VITE_KEYCLOAK_URL: "http://localhost:8080"
      VITE_KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
      VITE_KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID}"
    command: ["npm", "run", "start", "--", "--host", "0.0.0.0", "--port", "3000"]
    depends_on:
      - api
      - keycloakgame
    networks:
      - backend
    volumes:
      - ./dashboard:/app
      - dashboard-node-modules:/app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  healthcheck_service:
    build: ./healthcheck_service
    container_name: health_checker
    env_file:
      - .env
    environment:
      DB_HOST: "postgrespostgres"
      API_URL_KPI: "http://api:8000/api/v1/kpi"
    depends_on:
      - postgrespostgres
      - api
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

networks:
  backend:
    driver: "bridge"

volumes:
  postgrespostgres-data:
  keycloak-data:
  game-logs:
  dashboard-node-modules:
