[pytest]
testpaths = tests
pythonpath = .
# pytest-asyncio >=1.0 removed the implicit "legacy" auto-collection that ran
# async tests without an explicit @pytest.mark.asyncio marker. "auto" preserves
# that behavior (every async test is treated as asyncio), so the suite keeps
# running unchanged after the pytest 8->9 / pytest-asyncio 0.19->1.4 bump.
asyncio_mode = auto
markers =
    e2e_base_state(state): Set initial E2E database state for a test.
    e2e_base_snapshot(path): Start E2E test from a SQLite snapshot file.
    e2e_real_http: End-to-end tests that call a live API over HTTP and assert against PostgreSQL.
