version: "3.7"

services:
  api:
    container_name: "GAME_API_DEV"
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=dev
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=debug
    networks:
      - greencrowd
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - game-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"


  keycloakGame:
    container_name: "keycloakGame"
    image: keycloak/keycloak:25.0
    hostname: keycloak
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - keycloak-data:/opt/keycloak/data
    command: ["start-dev"]
    networks:
      greencrowd:
        aliases:
          - localhost

  healthcheck_service:
    build: ./healthcheck_service
    container_name: health_checker
    env_file:
      - .env
    environment:
      DB_HOST: "postgrespostgres"
      API_URL_KPI: "http://api:8000/api/v1/kpi"
    depends_on:
      - api
    networks:
      - greencrowd

  # Sprint 11 follow-up: Prometheus + Grafana joined to the same
  # external ``greencrowd`` network as the api so the scrape target
  # ``api:8000`` resolves via Docker DNS.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: "GAME_PROMETHEUS"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - greencrowd
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: "GAME_GRAFANA"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - greencrowd
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgrespostgres-data:
  keycloak-data:
  game-logs:
  prometheus-data:
  grafana-data:

networks:
  greencrowd:
    external: true
