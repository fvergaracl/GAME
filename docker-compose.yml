services:
  api:
    container_name: "GAME_API"
    build:
      context: .
      target: prod
    ports:
      - "80:8000"
    env_file:
      - .env.prod
    environment:
      - ENV=prod
    networks:
      - backend
    depends_on:
      - postgres
    volumes:
      - game-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "app=high_logging"
        env: "ENV,DEBUG"
        tag: "{{.ImageName}}/{{.Name}}/{{.ID}}"

  postgres:
    container_name: "postgres"
    image: postgres:16-alpine
    hostname: db
    ports:
      - "5432:5432"
    env_file:
      - .env.prod

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - backend
    volumes:
      - postgres-data:/var/lib/postgresql/data

  healthcheck_service:
    image: fvergaracl/game-health-check:latest
    container_name: health_checker
    env_file:
      - .env.prod
    environment:
      DB_HOST: "postgres"
      API_URL_KPI: "http://api:8000/api/v1/kpi"
    depends_on:
      - postgres
    networks:
      - backend

  # Sprint 11 follow-up: Prometheus + Grafana for production. Ports
  # are bound to localhost only so the metrics stack is not exposed
  # outside the host -- access via SSH tunnel or by changing the
  # binding intentionally. /metrics on the api itself remains
  # reachable on the docker network only; the public api port
  # (80 -> 8000) does NOT proxy /metrics through any nginx/ingress
  # by default, but operators fronting the api directly should keep
  # METRICS_ENABLED=false in .env.prod or block /metrics at the
  # ingress (see docs/dsl/runbook.md).
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: "GAME_PROMETHEUS"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - backend
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: "GAME_GRAFANA"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  backend:
    driver: "bridge"

volumes:
  postgres-data:
  game-logs:
  prometheus-data:
  grafana-data:
